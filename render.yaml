services:
  - type: web
    name: salus-invoicing-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"
    envVars:
      - key: VITE_API_BASE_URL
        value: https://salus-invoicing.onrender.com
